version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: petalpath_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: petalpath_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    container_name: petalpath_server
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/petalpath_db?schema=public
      JWT_SECRET: super-secret-jwt-key-change-in-production
      JWT_REFRESH_SECRET: super-secret-refresh-jwt-key-change-in-production
      NODE_ENV: development
    volumes:
      - storage:/app/storage
    depends_on:
      - db

volumes:
  pgdata:
  storage:
